<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LivaNova CP — Sales Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 14px; }
  .dash { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 8px; }
  .top-bar h1 { font-size: 20px; font-weight: 600; color: #111; }
  .top-bar .sub { font-size: 13px; color: #666; margin-top: 2px; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; }
  select { font-size: 13px; padding: 6px 10px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #111; cursor: pointer; }
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .metric { background: #fff; border-radius: 10px; border: 1px solid #eee; padding: 14px 16px; }
  .metric-label { font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
  .metric-value { font-size: 22px; font-weight: 600; color: #111; }
  .metric-sub { font-size: 12px; margin-top: 3px; }
  .green { color: #3B6D11; } .red { color: #A32D2D; } .amber { color: #854F0B; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 1rem 1.25rem; }
  .card h3 { font-size: 14px; font-weight: 600; color: #111; margin-bottom: 12px; }
  .card-full { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 12px; }
  .card-full h3 { font-size: 14px; font-weight: 600; color: #111; margin-bottom: 12px; }
  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 10px; font-size: 12px; color: #666; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; font-size: 13px; border-collapse: collapse; }
  th { text-align: left; font-weight: 600; color: #888; padding: 6px 8px; border-bottom: 1px solid #eee; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; }
  td { padding: 8px 8px; border-bottom: 1px solid #f0f0f0; color: #111; }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 600; }
  .badge-green { background: #EAF3DE; color: #3B6D11; }
  .badge-red { background: #FCEBEB; color: #A32D2D; }
  .badge-amber { background: #FAEEDA; color: #854F0B; }
  .upload-bar { display: flex; align-items: center; gap: 10px; background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 10px 14px; margin-bottom: 1.25rem; font-size: 13px; color: #666; flex-wrap: wrap; }
  .upload-bar b { color: #185FA5; }
  .progress-bar-wrap { height: 6px; background: #eee; border-radius: 3px; margin-top: 6px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 3px; }
  @media (max-width: 560px) { .charts-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="dash">
  <div class="top-bar">
    <div>
      <h1>LivaNova Cardiopulmonary</h1>
      <div class="sub" id="statusLabel">Initializing...</div>
    </div>
    <div class="controls">
      <select id="periodSel" onchange="render()">
        <option value="monthly" selected>Monthly View</option>
        <option value="ytd">Year-to-date</option>
      </select>
    </div>
  </div>

  <div class="upload-bar">
    <span id="fileLabel">Connecting to Live Google Sheet...</span>
  </div>

  <div class="metric-grid" id="metrics"></div>

  <div class="charts-row">
    <div class="card">
      <h3>Revenue vs. Quota</h3>
      <div style="position:relative;height:220px;"><canvas id="revChart"></canvas></div>
    </div>
    <div class="card">
      <h3>Product Mix</h3>
      <div class="legend" id="mixLegend"></div>
      <div style="position:relative;height:220px;"><canvas id="mixChart"></canvas></div>
    </div>
  </div>

  <div class="card-full">
    <h3>Sales by Hospital Account</h3>
    <div style="position:relative;" id="hospChartWrap"><canvas id="hospChart"></canvas></div>
  </div>

  <div class="card-full">
    <h3>Account Detail</h3>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Hospital</th><th>Revenue</th><th>Quota</th><th>Attainment</th><th>Top Product</th><th>Status</th></tr></thead>
        <tbody id="hospBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTURF715uLBhj-OJMYM0Cfn91YbxxK5b5VL8-hqjH_yU3tRiVm0_LWHTJrDXYOatz04BFqbec0pOwlW/pub?gid=0&single=true&output=csv';
const COLORS = ['#185FA5','#1D9E75','#BA7517','#993556','#533F4A','#639922','#D85A30'];
let data = null, revCI=null, mixCI=null, hospCI=null;

async function init() {
  try {
    const res = await fetch(SHEET_URL);
    const csv = await res.text();
    parseData(csv);
  } catch (e) {
    document.getElementById('fileLabel').textContent = "Connection failed. Check internet.";
  }
}

function parseData(csv) {
  const rows = csv.trim().split('\n').map(r => r.split(',').map(c => c.trim().replace(/^"|"$/g,'')));
  const hdr = rows[0].map(h => h.toLowerCase());
  
  const hi = hdr.findIndex(h=>h.includes('hospital'));
  const ri = hdr.findIndex(h=>h.includes('revenue'));
  const qi = hdr.findIndex(h=>h.includes('quota'));
  const pi = hdr.findIndex(h=>h.includes('product'));
  const pei= hdr.findIndex(h=>h.includes('period')||h.includes('month'));

  const byH={}, byP={}, prodMix={};
  rows.slice(1).forEach(r => {
    const h=r[hi]||'Unknown', v=parseFloat(r[ri])||0, q=parseFloat(r[qi])||0;
    const p=r[pi]||'Other', per=r[pei]||'Total';
    if(!byH[h]) byH[h]={rev:0,quota:0,prods:{}};
    byH[h].rev+=v; byH[h].quota+=q;
    byH[h].prods[p]=(byH[h].prods[p]||0)+v;
    if(!byP[per]) byP[per]={rev:0,quota:0};
    byP[per].rev+=v; byP[per].quota+=q;
    prodMix[p]=(prodMix[p]||0)+v;
  });

  const hk=Object.keys(byH).sort((a,b)=>byH[b].rev-byH[a].rev);
  const pk=Object.keys(byP);

  data = {
    periods: pk,
    hospitals: hk,
    revenue: pk.map(p=>byP[p].rev),
    quota: pk.map(p=>byP[p].quota),
    productMix: prodMix,
    hospRevenue: hk.map(h=>byH[h].rev),
    hospQuota: hk.map(h=>byH[h].quota),
    hospTopProd: hk.map(h=>{const tp=byH[h].prods;return Object.keys(tp).sort((a,b)=>tp[b]-tp[a])[0]||'-';})
  };
  
  document.getElementById('fileLabel').innerHTML = "<b>Status:</b> Live Sync Active";
  document.getElementById('statusLabel').textContent = "Technical & Clinical Performance";
  render();
}

function fmt(n) { return '€' + Math.round(n).toLocaleString(); }
function pct(a,b) { return b ? Math.round(a/b*100)+'%' : '—'; }

function render() {
  if (!data) return;
  const view = document.getElementById('periodSel').value;
  let periods=[...data.periods], revenue=[...data.revenue], quota=[...data.quota];

  if (view==='ytd') {
    periods=['YTD']; revenue=[revenue.reduce((a,b)=>a+b,0)]; quota=[quota.reduce((a,b)=>a+b,0)];
  }

  const totRev=revenue.reduce((a,b)=>a+b,0), totQ=quota.reduce((a,b)=>a+b,0);
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">Total Revenue</div><div class="metric-value">${fmt(totRev)}</div></div>
    <div class="metric"><div class="metric-label">Attainment</div><div class="metric-value">${pct(totRev,totQ)}</div></div>
    <div class="metric"><div class="metric-label">Accounts</div><div class="metric-value">${data.hospitals.length}</div></div>
    <div class="metric"><div class="metric-label">Gap</div><div class="metric-value">${fmt(Math.abs(totRev-totQ))}</div></div>
  `;

  if(revCI) revCI.destroy();
  revCI=new Chart(document.getElementById('revChart'),{
    type:'bar',
    data:{labels:periods,datasets:[
      {label:'Actual',data:revenue,backgroundColor:'#185FA5',borderRadius:4},
      {label:'Quota',data:quota,type:'line',borderColor:'#E24B4A',borderWidth:2,borderDash:[5,4],pointRadius:0}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}
  });

  const mixKeys=Object.keys(data.productMix), mixVals=mixKeys.map(k=>data.productMix[k]);
  if(mixCI) mixCI.destroy();
  mixCI=new Chart(document.getElementById('mixChart'),{
    type:'doughnut',
    data:{labels:mixKeys,datasets:[{data:mixVals,backgroundColor:COLORS}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}
  });

  if(hospCI) hospCI.destroy();
  hospCI=new Chart(document.getElementById('hospChart'),{
    type:'bar',
    data:{labels:data.hospitals,datasets:[{data:data.hospRevenue,backgroundColor:'#185FA5'}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}
  });

  document.getElementById('hospBody').innerHTML=data.hospitals.map((h,i)=>{
    const r=data.hospRevenue[i], q=data.hospQuota[i];
    return `<tr><td><b>${h}</b></td><td>${fmt(r)}</td><td>${fmt(q)}</td><td>${pct(r,q)}</td><td>${data.hospTopProd[i]}</td><td>${r>=q?'✅':'⚠️'}</td></tr>`;
  }).join('');
}

init();
</script>
</body>
</html>
